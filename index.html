<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Desafio das Garrafas</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(#083b5c,#07999b);
    color:white;
}

h1{
    background:black;
    margin:0;
    padding:10px;
}

#painel{
    margin-top:15px;
}

#tempo{
    background:#4d90fe;
    display:inline-block;
    padding:10px 30px;
    border-radius:0 0 20px 20px;
    font-size:32px;
    font-weight:bold;
}

#mensagem{
    margin:25px auto;
    width:320px;
    background:#69aaf5;
    padding:15px;
    font-size:30px;
    font-weight:bold;
    border-radius:10px;
}

.linha{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:25px;
    flex-wrap:wrap;
}

.garrafa{
    width:70px;
    height:120px;
    border-radius:25px 25px 12px 12px;
    border:3px solid #222;
    cursor:pointer;
    position:relative;
    box-shadow:0 4px 8px #0008;
    transition: transform 0.45s ease;
}

.garrafa::before{
    content:"";
    position:absolute;
    width:28px;
    height:22px;
    top:-24px;
    left:18px;
    background:inherit;
    border:3px solid #222;
    border-radius:8px 8px 0 0;
}

.selecionada{
    transform:scale(1.1);
    border:4px solid yellow;
}

.oculta{
    background:gray !important;
}

button{
    margin:8px;
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

input{
    padding:10px;
    font-size:18px;
    width:100px;
    text-align:center;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<h1>Desafio das Garrafas</h1>

<div id="painel">

    <div id="tempo">01:30</div>

    <br><br>

    <input type="number" id="novoTempo" value="90" min="10">

    <button onclick="alterarTempo()">Definir Tempo</button>

    <button onclick="adicionarGarrafas()">+ Garrafas</button>

    <button onclick="mostrarSegredo()">Revelar Garrafas</button>

    <button onclick="reiniciar()">Reiniciar</button>

</div>

<div id="mensagem">0 MATCHES</div>

<div class="linha" id="linhaCima"></div>
<div class="linha" id="linhaBaixo"></div>

<script>
let cores = [
    "limegreen",
    "turquoise",
    "purple",
    "deeppink"
];

const coresExtras = [
    "orange",
    "red",
    "gold",
    "blue",
    "pink",
    "brown",
    "cyan",
    "white"
];

let indiceExtra = 0;

let segredo = [];
let jogador = [];

let selecionada = null;

let tempoInicial = 90;
let tempo = 90;

let intervalo;

let animando = false;
let jogoFinalizado = false;

const linhaCima = document.getElementById("linhaCima");
const linhaBaixo = document.getElementById("linhaBaixo");
const mensagem = document.getElementById("mensagem");
const tempoTela = document.getElementById("tempo");

function embaralhar(lista){
    return [...lista].sort(() => Math.random() - 0.5);
}

function iniciar(){
    segredo = embaralhar(cores);
    jogador = embaralhar(cores);

    selecionada = null;
    tempo = tempoInicial;
    animando = false;
    jogoFinalizado = false;

    desenhar();
    verificar();
    iniciarTempo();
}

function desenhar(){
    linhaCima.innerHTML = "";
    linhaBaixo.innerHTML = "";

    jogador.forEach((cor, indice) => {
        const garrafa = document.createElement("div");
        garrafa.className = "garrafa";
        garrafa.style.background = cor;
        garrafa.onclick = () => selecionar(indice);

        if(selecionada === indice){
            garrafa.classList.add("selecionada");
        }

        linhaCima.appendChild(garrafa);
    });

    segredo.forEach(() => {
        const garrafa = document.createElement("div");
        garrafa.className = "garrafa oculta";
        linhaBaixo.appendChild(garrafa);
    });
}

function selecionar(indice){
    if(tempo <= 0 || animando || jogoFinalizado){
        return;
    }

    if(selecionada === null){
        selecionada = indice;
        desenhar();
    }else{
        animarTroca(selecionada, indice);
        selecionada = null;
    }
}

function animarTroca(pos1, pos2){
    if(pos1 === pos2){
        selecionada = null;
        desenhar();
        return;
    }

    animando = true;

    const garrafas = document.querySelectorAll("#linhaCima .garrafa");

    const garrafa1 = garrafas[pos1];
    const garrafa2 = garrafas[pos2];

    const rect1 = garrafa1.getBoundingClientRect();
    const rect2 = garrafa2.getBoundingClientRect();

    const distanciaX1 = rect2.left - rect1.left;
    const distanciaX2 = rect1.left - rect2.left;

    garrafa1.style.transform = `translateX(${distanciaX1}px)`;
    garrafa2.style.transform = `translateX(${distanciaX2}px)`;

    setTimeout(() => {
        let temp = jogador[pos1];
        jogador[pos1] = jogador[pos2];
        jogador[pos2] = temp;

        animando = false;

        desenhar();
        verificar();
    },450);
}

function verificar(){
    let matches = 0;

    for(let i = 0; i < segredo.length; i++){
        if(jogador[i] === segredo[i]){
            matches++;
        }
    }

    mensagem.innerHTML = matches + " MATCHES";

    if(matches === segredo.length){
        mensagem.innerHTML = "FINALIZADO!";
        clearInterval(intervalo);
        jogoFinalizado = true;
        revelarSequencia();
    }
}

function revelarSequencia(){
    const garrafasBaixo = document.querySelectorAll("#linhaBaixo .garrafa");

    garrafasBaixo.forEach((garrafa, indice) => {
        garrafa.classList.remove("oculta");
        garrafa.style.background = segredo[indice];
    });
}

function mostrarSegredo(){
    revelarSequencia();
}

function iniciarTempo(){
    clearInterval(intervalo);
    atualizarRelogio();

    intervalo = setInterval(() => {
        tempo--;
        atualizarRelogio();

        if(tempo <= 0){
            clearInterval(intervalo);
            mensagem.innerHTML = "TEMPO ESGOTADO!";
            jogoFinalizado = true;
            revelarSequencia();
        }
    },1000);
}

function atualizarRelogio(){
    let minutos = Math.floor(tempo / 60);
    let segundos = tempo % 60;

    tempoTela.innerHTML =
        String(minutos).padStart(2,"0") +
        ":" +
        String(segundos).padStart(2,"0");
}

function alterarTempo(){
    const valor = parseInt(document.getElementById("novoTempo").value);

    if(valor > 0){
        tempoInicial = valor;
        reiniciar();
    }
}

function adicionarGarrafas(){
    if(indiceExtra < coresExtras.length){
        cores.push(coresExtras[indiceExtra]);
        indiceExtra++;
        reiniciar();
    }
}

function reiniciar(){
    iniciar();
}

iniciar();
</script>

</body>
</html>
